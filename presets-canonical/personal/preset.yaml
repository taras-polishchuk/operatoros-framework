version: "0.2"
name: personal
description: |
  Empty OperatorOS workspace scaffold. The `personal` preset ships with no
  modules — the methodology is yours to assemble. Add modules with
  `operatoros add <path-or-git-url>`.
modules: []
settings:
  vault_path: vault/
  state_path: state/
  export:
    deny:
      - "vault/**"
      - "**/.env"
      - "**/.env.*"
      - "**/*.sqlite"
      - "**/*.sqlite-wal"
      - "**/*.sqlite-shm"
      - "**/id_rsa"
      - "**/id_rsa.pub"
      - "**/secrets.yaml"
