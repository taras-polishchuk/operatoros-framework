version: "0.2"
name: timer
description: |
  Minimal time tracker. Demonstrates settings, positional args, multiple commands,
  and state persistence under <module-dir>/state/. Pair with `journal` for a
  full-featured productivity baseline.
author: "Taras Polishchuk"
license: MIT
tags:
  - example
  - timer
  - productivity
  - settings
requires:
  core_version: ">=0.5.0"
settings:
  default_minutes: 25
  log_path: "state/timer.log"
commands:
  start:
    run: "mkdir -p \"$(dirname \"$LOG_PATH\")\" && echo \"[$(date -Iseconds)] started task $1 for ${2:-$DEFAULT_MINUTES} min\" >> \"$LOG_PATH\" && cat \"$LOG_PATH\""
    description: "Start a task timer. Args: <task-name> [minutes]"
    args:
      - "<task-name>"
      - "[minutes]"
  stop:
    run: "mkdir -p \"$(dirname \"$LOG_PATH\")\" && echo \"[$(date -Iseconds)] stopped task $1\" >> \"$LOG_PATH\" && cat \"$LOG_PATH\""
    description: "Stop a task. Args: <task-name>"
    args:
      - "<task-name>"
  list:
    run: "mkdir -p \"$(dirname \"$LOG_PATH\")\" && cat \"$LOG_PATH\" 2>/dev/null || echo '(no entries yet — run `operatoros run timer start foo`)'"
    description: "Show all timed entries"