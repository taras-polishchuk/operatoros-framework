name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — needed for tooling that introspects git history.
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: core
        run: npm ci --no-audit --no-fund

      - name: TypeScript compile (no emit)
        working-directory: core
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: core
        run: npm test

      - name: Build
        working-directory: core
        run: npm run build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # Full history fetch — gitleaks needs parent SHAs for proper --first-parent
      # history scanning. With fetch-depth: 1 (default), the diff between
      # b591bb6^..HEAD fails with 'unknown revision' because b591bb6 is the
      # first commit and has no parent in the shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: --redact --no-banner