version: "0.2"
name: journal
description: |
  Append-only journal entries. Demonstrates the simplest possible OperatorOS module:
  one command (`add`), one file (`journal.txt`), no external deps.
author: "Taras Polishchuk"
license: MIT
tags:
  - example
  - journal
  - notes
commands:
  add:
    run: "echo \"[$(date -Iseconds)] $*\" >> journal.txt"
    description: "Append a timestamped entry to journal.txt"
  list:
    run: "cat journal.txt"
    description: "Print all journal entries"
