version: "0.2"
name: personal
description: |
  Default OperatorOS workspace. Installs two bundled example modules
  (journal, timer) so `operatoros apply` produces something visible
  immediately. Override with `operatoros add <path-or-url>` for your own.
modules:
  - name: journal
    source: ../../examples/journal
  - name: timer
    source: ../../examples/timer
settings:
  vault_path: vault/
  state_path: state/
  export:
    deny:
      - "vault/**"
      - "**/.env"
      - "**/.env.*"
      - "**/*.sqlite"
      - "**/*.sqlite-wal"
      - "**/*.sqlite-shm"
      - "**/id_rsa"
      - "**/id_rsa.pub"
      - "**/secrets.yaml"